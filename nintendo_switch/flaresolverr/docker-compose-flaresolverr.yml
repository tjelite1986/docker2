services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
      TZ: $TZ
    networks:
      - nintendo_switch
    ports:
      - 8191:8191

networks:
  nintendo_switch:
    external: true
